<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一键安装工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 50px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
        }
        .features {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .feature {
            background: #e3f2fd;
            color: #1565c0;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }
        .cmd-box {
            background: #1e1e1e;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            position: relative;
        }
        .cmd-box code {
            color: #4ec9b0;
            font-family: "Fira Code", "Consolas", monospace;
            font-size: 14px;
            word-break: break-all;
            line-height: 1.6;
        }
        .cmd-label {
            color: #858585;
            font-size: 12px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .copy-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #333;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        .copy-btn:hover { background: #555; }
        .steps {
            margin-top: 30px;
        }
        .step {
            display: flex;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        .step-num {
            background: #667eea;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            flex-shrink: 0;
        }
        .step-content h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 5px;
        }
        .step-content p {
            color: #666;
            font-size: 14px;
        }
        .github-btn {
            display: inline-block;
            background: #24292e;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            margin-top: 20px;
            font-weight: 500;
        }
        .github-btn:hover { background: #000; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 一键安装工具</h1>
        <p class="subtitle">一条命令，自动完成环境配置和软件安装</p>
        
        <div class="features">
            <span class="feature">ROS1/ROS2</span>
            <span class="feature">Docker</span>
            <span class="feature">系统源</span>
            <span class="feature">VSCode</span>
        </div>
        
        <div class="cmd-box">
            <div class="cmd-label">Quick Start</div>
            <code>wget https://no-one-wu.github.io/my-installer/install -O myinstaller && . myinstaller</code>
            <button class="copy-btn" onclick="copyCmd()">复制</button>
        </div>
        
        <div class="steps">
            <div class="step">
                <div class="step-num">1</div>
                <div class="step-content">
                    <h3>复制命令</h3>
                    <p>复制上方的 wget 命令到终端</p>
                </div>
            </div>
            <div class="step">
                <div class="step-num">2</div>
                <div class="step-content">
                    <h3>自动下载</h3>
                    <p>脚本自动下载所有依赖文件到临时目录</p>
                </div>
            </div>
            <div class="step">
                <div class="step-num">3</div>
                <div class="step-content">
                    <h3>交互安装</h3>
                    <p>选择需要的功能，一键完成安装配置</p>
                </div>
            </div>
        </div>
        
        <a href="https://github.com/no-one-wu/my-installer" class="github-btn">📂 查看源码</a>
    </div>
    
    <script>
        function copyCmd() {
            const cmd = 'wget https://no-one-wu.github.io/my-installer/install -O myinstaller && . myinstaller';
            navigator.clipboard.writeText(cmd).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = '已复制';
                setTimeout(() => btn.textContent = '复制', 2000);
            });
        }
    </script>
</body>
</html>
